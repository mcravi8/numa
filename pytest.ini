[pytest]
# Put the repo root on sys.path so tests can `from main import app`.
pythonpath = .
testpaths = tests
markers =
    network: test requires live internet access (yfinance / Yahoo Finance); auto-skipped offline
filterwarnings =
    # Starlette 1.3's TestClient warns that its httpx integration is deprecated
    # ("install httpx2 instead"). That is internal to Starlette and outside our
    # control (we pin httpx for FastAPI); silence it so the suite stays clean.
    ignore:Using .httpx. with .starlette.testclient. is deprecated
